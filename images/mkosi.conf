# DD Marketplace — sealed confidential VM image
# Reproducible build with dm-verity. Every byte measured into TDX attestation.

[Distribution]
Distribution=ubuntu
Release=noble

[Output]
ImageId=dd-marketplace
Format=disk
ManifestFormat=json

[Content]
SourceDateEpoch=0
Bootable=yes
Bootloader=systemd-boot

# dm-verity roothash appended to kernel cmdline by mkosi
KernelCommandLine=intel_iommu=on

KernelModulesInitrdInclude=dm-verity
                          dm-mod

Packages=
    systemd
    systemd-boot-efi
    udev
    ca-certificates
    ubuntu-keyring
    cryptsetup
    curl
    kmod
    linux-generic-hwe-24.04

Autologin=no
Locale=C.UTF-8

SkeletonTrees=mkosi.skeleton
CleanPackageMetadata=yes
RemoveFiles=/var/log/*
RemoveFiles=/var/cache
RemoveFiles=/etc/*-

[Build]
CacheDirectory=mkosi.cache
WithNetwork=yes
Environment=SOURCE_DATE_EPOCH=0
