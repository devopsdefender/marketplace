name: Build App Images

on:
  push:
    branches: [main]
    paths:
      - "apps/**"
  pull_request:
    paths:
      - "apps/**"
  workflow_dispatch:

permissions:
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: apps/openclaw
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/devopsdefender/openclaw:${{ github.sha }}
            ghcr.io/devopsdefender/openclaw:latest
