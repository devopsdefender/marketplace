name: Staging Deploy

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/*staging*"
      - ".github/workflows/staging-deploy.yml"
  workflow_dispatch:

concurrency:
  group: marketplace-staging
  cancel-in-progress: true

permissions:
  contents: read

env:
  DD_ENV: staging
  DD_DOMAIN: ${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}
  VM_NAME: dd-vm-staging
  SSH_HOST: 162.222.34.121
  SSH_USER: tdx2
  BASE_IMAGE: /var/lib/libvirt/images/ubuntu-24.04-cloudimg-amd64.img
  BASE_IMAGE_URL: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img
  OPENCLAW_IMAGE: ghcr.io/openclaw/openclaw:latest

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BAREMETAL_SSH_KEY }}" > /tmp/deploy-key
          chmod 600 /tmp/deploy-key
          ssh-keyscan -H ${SSH_HOST} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Resolve dd-agent binary URL
        id: dd
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          url=$(curl -sf https://api.github.com/repos/devopsdefender/dd/releases \
            | jq -r '[.[] | select(.tag_name | startswith("staging-"))][0].assets[] | select(.name=="dd-agent") | .browser_download_url')
          if [ -z "$url" ] || [ "$url" = "null" ]; then
            echo "::error::No staging dd-agent release found"
            exit 1
          fi
          echo "binary_url=${url}" >> "$GITHUB_OUTPUT"
          echo "Using dd-agent: ${url}"

      - name: Destroy old VM
        run: |
          SSH="ssh -i /tmp/deploy-key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST}"
          $SSH "sudo virsh destroy ${VM_NAME} 2>/dev/null; sudo virsh undefine ${VM_NAME} --remove-all-storage 2>/dev/null" || true

      - name: Create VM
        env:
          DD_PASSWORD: ${{ secrets.DD_PASSWORD }}
          DD_AGENT_URL: ${{ steps.dd.outputs.binary_url }}
        run: scripts/deploy-staging.sh

      - name: Wait for agent
        id: vm
        run: |
          set -euo pipefail
          SSH="ssh -i /tmp/deploy-key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST}"

          $SSH "sudo virsh dominfo ${VM_NAME}" || {
            echo "::error::VM ${VM_NAME} is not running"
            exit 1
          }

          VM_MAC=$($SSH "sudo virsh domiflist ${VM_NAME} | awk '/virbr0/ {print \$5}'")
          for i in $(seq 1 24); do
            VM_IP=$($SSH "sudo virsh net-dhcp-leases default | grep '$VM_MAC' | awk '{print \$5}' | cut -d/ -f1")
            [ -n "$VM_IP" ] && break
            echo "  waiting for VM IP... attempt ${i}/24"
            sleep 5
          done
          [ -z "$VM_IP" ] && { echo "::error::VM did not get an IP address"; exit 1; }
          echo "VM IP: ${VM_IP}"
          echo "vm_ip=${VM_IP}" >> "$GITHUB_OUTPUT"

          for i in $(seq 1 60); do
            health=$($SSH "curl -fsS http://${VM_IP}:8080/health" 2>/dev/null) || true
            if [ -n "$health" ]; then
              echo "Agent healthy: $health"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Agent not healthy within 5 minutes"
              exit 1
            fi
            echo "  waiting for agent... attempt ${i}/60"
            sleep 5
          done

          # Check agent registered with fleet
          REGISTER_URL="https://app-staging.${DD_DOMAIN}/health"
          echo "Checking fleet register at ${REGISTER_URL}..."
          fleet_health=$(curl -fsS "$REGISTER_URL" 2>/dev/null) || true
          echo "Fleet: $fleet_health"

      - name: Deploy and configure openclaw
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DD_PASSWORD: ${{ secrets.DD_PASSWORD }}
        run: |
          set -euo pipefail
          SSH="ssh -i /tmp/deploy-key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST}"
          VM_IP="${{ steps.vm.outputs.vm_ip }}"
          API="http://${VM_IP}:8080"
          AUTH="Authorization: Bearer ${DD_PASSWORD}"

          # Deploy openclaw container
          echo "Deploying openclaw..."
          $SSH "curl -fsS -X POST ${API}/deploy \
            -H 'Content-Type: application/json' \
            -H '${AUTH}' \
            -d '{
              \"image\": \"${OPENCLAW_IMAGE}\",
              \"app_name\": \"openclaw\",
              \"env\": [\"OPENAI_API_KEY=${OPENAI_API_KEY:-}\"]
            }'"
          echo "openclaw deploy requested"

          # Wait for openclaw container to be ready
          echo "Waiting for openclaw container..."
          for i in $(seq 1 60); do
            result=$($SSH "curl -fsS -X POST ${API}/exec \
              -H 'Content-Type: application/json' \
              -H '${AUTH}' \
              -d '{\"cmd\":[\"podman\",\"exec\",\"openclaw\",\"echo\",\"ready\"]}'" 2>/dev/null) || true
            if echo "$result" | grep -q '"exit_code":0'; then
              echo "openclaw container ready"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::openclaw container not ready within 5 minutes"
              exit 1
            fi
            echo "  waiting... attempt ${i}/60"
            sleep 5
          done

          # Configure openclaw
          echo "Configuring openclaw..."
          exec_cmd() {
            $SSH "curl -fsS -X POST ${API}/exec \
              -H 'Content-Type: application/json' \
              -H '${AUTH}' \
              -d '{\"cmd\":$1}'"
          }

          exec_cmd '["podman","exec","openclaw","openclaw","config","set","gateway.mode","local"]'
          exec_cmd '["podman","exec","openclaw","openclaw","config","set","gateway.bind","lan"]'
          exec_cmd '["podman","exec","openclaw","openclaw","config","set","gateway.auth.mode","token"]'
          exec_cmd '["podman","exec","openclaw","openclaw","config","set","gateway.auth.token","dd-marketplace"]'
          exec_cmd '["podman","exec","openclaw","openclaw","config","set","gateway.controlUi.dangerouslyAllowHostHeaderOriginFallback","true"]'

          # Set OpenAI models — base64 encode to avoid JSON escaping hell
          BATCH_B64=$(echo '[{"path":"models.providers.openai.baseUrl","value":"https://api.openai.com/v1"},{"path":"models.providers.openai.models","value":[{"id":"gpt-5.4","name":"GPT-5.4","api":"openai-responses"},{"id":"gpt-5.4-mini","name":"GPT-5.4 Mini","api":"openai-responses"},{"id":"gpt-4o","name":"GPT-4o","api":"openai-responses"}]}]' | base64 -w0)
          exec_cmd "[\"podman\",\"exec\",\"openclaw\",\"bash\",\"-c\",\"echo ${BATCH_B64} | base64 -d > /tmp/batch.json && openclaw config set --batch-file /tmp/batch.json\"]"

          # Restart to apply config
          exec_cmd '["podman","restart","openclaw"]'
          echo "openclaw configured and restarted"

          # Verify openclaw is serving
          sleep 5
          result=$($SSH "curl -fsS -X POST ${API}/exec \
            -H 'Content-Type: application/json' \
            -H '${AUTH}' \
            -d '{\"cmd\":[\"podman\",\"exec\",\"openclaw\",\"openclaw\",\"config\",\"get\",\"models.providers\"]}'")
          echo "Model config: $result"

          echo ""
          echo "═══════════════════════════════════════"
          echo "  Marketplace staging deployed"
          echo "═══════════════════════════════════════"

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/deploy-key /tmp/user-data /tmp/meta-data
