name: Staging Deploy

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: marketplace-staging
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  DD_ENV: staging
  DD_DOMAIN: ${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}
  VM_NAME: dd-vm-staging
  SSH_HOST: 162.222.34.121
  SSH_USER: tdx2
  BASE_IMAGE: /var/lib/libvirt/images/ubuntu-24.04-cloudimg-amd64.img
  BASE_IMAGE_URL: https://cloud-images.ubuntu.com/noble/current/noble-server-cloudimg-amd64.img

jobs:
  build-apps:
    runs-on: ubuntu-latest
    outputs:
      openclaw_image: ghcr.io/devopsdefender/openclaw:${{ github.sha }}
      signal_cli_image: ghcr.io/devopsdefender/signal-cli:latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: apps/openclaw
          push: true
          tags: |
            ghcr.io/devopsdefender/openclaw:${{ github.sha }}
            ghcr.io/devopsdefender/openclaw:latest

      - uses: docker/build-push-action@v6
        with:
          context: apps/signal-cli
          push: true
          tags: ghcr.io/devopsdefender/signal-cli:latest

  deploy:
    needs: build-apps
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BAREMETAL_SSH_KEY }}" > /tmp/deploy-key
          chmod 600 /tmp/deploy-key
          ssh-keyscan -H ${SSH_HOST} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Resolve dd-agent binary URL
        id: dd
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          url=$(curl -sf https://api.github.com/repos/devopsdefender/dd/releases \
            | jq -r '[.[] | select(.tag_name | startswith("staging-"))][0].assets[] | select(.name=="dd-agent") | .browser_download_url')
          if [ -z "$url" ] || [ "$url" = "null" ]; then
            echo "::error::No staging dd-agent release found"
            exit 1
          fi
          echo "binary_url=${url}" >> "$GITHUB_OUTPUT"
          echo "Using dd-agent: ${url}"

      - name: Destroy old VM
        run: |
          SSH="ssh -i /tmp/deploy-key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST}"
          $SSH "sudo virsh destroy ${VM_NAME} 2>/dev/null; sudo virsh undefine ${VM_NAME} --remove-all-storage 2>/dev/null" || true

      - name: Create VM
        env:
          OPENCLAW_IMAGE: ${{ needs.build-apps.outputs.openclaw_image }}
          SIGNAL_CLI_IMAGE: ${{ needs.build-apps.outputs.signal_cli_image }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DD_AGENT_URL: ${{ steps.dd.outputs.binary_url }}
        run: |
          set -euo pipefail
          SSH="ssh -i /tmp/deploy-key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST}"
          SCP="scp -i /tmp/deploy-key -o StrictHostKeyChecking=no"
          REGISTER_HOST="app-staging.${DD_DOMAIN}"

          # Ensure base image is cached on host
          $SSH "test -f ${BASE_IMAGE} || sudo curl -fsSL -o ${BASE_IMAGE} ${BASE_IMAGE_URL}"

          # Create disk backed by cloud image
          DISK="/var/lib/libvirt/images/${VM_NAME}.qcow2"
          $SSH "sudo qemu-img create -f qcow2 -b ${BASE_IMAGE} -F qcow2 ${DISK} 80G"

          # Generate cloud-init files (filenames must be exactly user-data and meta-data)
          cat > /tmp/user-data <<USERDATA
          #cloud-config
          runcmd:
            - apt-get update -q && apt-get install -y podman tmux linux-modules-extra-\$(uname -r) && modprobe tdx_guest && modprobe tsm_report && mount -t configfs configfs /sys/kernel/config 2>/dev/null || true
            - curl -fsSL -o /usr/local/bin/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 && chmod +x /usr/local/bin/cloudflared
            - curl -fsSL -o /usr/local/bin/dd-agent ${DD_AGENT_URL} && chmod +x /usr/local/bin/dd-agent
            - mkdir -p /etc/openclaw && echo '{"gateway":{"mode":"local","bind":"lan","auth":{"mode":"token","token":"dd-marketplace"},"controlUi":{"dangerouslyAllowHostHeaderOriginFallback":true}}}' > /etc/openclaw/openclaw.json
            - DD_OWNER=devopsdefender DD_ENV=staging DD_REGISTER_URL=wss://${REGISTER_HOST}/register DD_BOOT_CMD="tmux new-session -s openclaw 'podman run --rm --name openclaw -p 18789:18789 -v /etc/openclaw/openclaw.json:/home/node/.openclaw/openclaw.json:ro -e OPENROUTER_API_KEY=${OPENROUTER_API_KEY} ${OPENCLAW_IMAGE}'" DD_BOOT_APP=openclaw nohup /usr/local/bin/dd-agent > /var/log/dd-agent.log 2>&1 &
          USERDATA

          cat > /tmp/meta-data <<METADATA
          instance-id: ${VM_NAME}
          local-hostname: ${VM_NAME}
          METADATA

          # Copy cloud-init files to host and build ISO there
          SEED_ISO="/var/lib/libvirt/images/${VM_NAME}-seed.iso"
          $SCP /tmp/user-data /tmp/meta-data "${SSH_USER}@${SSH_HOST}:/tmp/"
          $SSH "cd /tmp && sudo genisoimage -output ${SEED_ISO} -volid cidata -joliet -rock user-data meta-data"

          # Launch TDX-protected VM with cloud-init ISO attached as cdrom
          $SSH "sudo virt-install \
            --name ${VM_NAME} \
            --ram 8192 \
            --vcpus 4 \
            --machine q35 \
            --disk path=${DISK},format=qcow2 \
            --disk path=${SEED_ISO},device=cdrom \
            --os-variant ubuntu24.04 \
            --network bridge=virbr0 \
            --graphics none \
            --boot firmware=efi \
            --launchSecurity type=tdx \
            --import \
            --noautoconsole"

          echo "VM ${VM_NAME} created"

      - name: Verify marketplace is live
        run: |
          set -euo pipefail
          SSH="ssh -i /tmp/deploy-key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST}"

          # Verify VM is running
          $SSH "sudo virsh dominfo ${VM_NAME}" || {
            echo "::error::VM ${VM_NAME} is not running"
            exit 1
          }

          # Get VM IP: match MAC address from VM definition against DHCP leases
          VM_MAC=$($SSH "sudo virsh domiflist ${VM_NAME} | awk '/virbr0/ {print \$5}'")
          for i in $(seq 1 24); do
            VM_IP=$($SSH "sudo virsh net-dhcp-leases default | grep '$VM_MAC' | awk '{print \$5}' | cut -d/ -f1")
            [ -n "$VM_IP" ] && break
            echo "  waiting for VM IP... attempt ${i}/24"
            sleep 5
          done
          [ -z "$VM_IP" ] && { echo "::error::VM did not get an IP address"; exit 1; }
          echo "VM IP: ${VM_IP}"

          # Wait for dd-agent health inside VM
          for i in $(seq 1 60); do
            health=$($SSH "curl -fsS http://${VM_IP}:8080/health" 2>/dev/null) || true
            if [ -n "$health" ]; then
              echo "Agent healthy: $health"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "::error::Agent not healthy within 5 minutes"
              exit 1
            fi
            echo "  waiting for agent... attempt ${i}/60"
            sleep 5
          done

          echo ""
          echo "═══════════════════════════════════════"
          echo "  Marketplace staging deployed"
          echo "  VM: ${VM_NAME} (${VM_IP})"
          echo "═══════════════════════════════════════"

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/deploy-key /tmp/user-data /tmp/meta-data /tmp/seed.iso
