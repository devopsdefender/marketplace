name: Deploy Marketplace

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      dd_agent_binary_url:
        description: "Override URL for dd-agent binary (must be < 24h old)"
        default: ""

concurrency:
  group: marketplace-staging
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  build-image:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/devopsdefender/marketplace
          tags: type=sha,prefix=
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
      - name: Ensure package is public
        continue-on-error: true
        run: |
          curl -s -X PATCH \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/orgs/devopsdefender/packages/container/marketplace" \
            -d '{"visibility":"public"}' | jq -r '.visibility // .message'

  deploy-vm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install ansible

      - name: Fetch dd-agent binary
        env:
          GH_TOKEN: ${{ github.token }}
          DD_AGENT_BINARY_URL: ${{ inputs.dd_agent_binary_url }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/dd-bin

          if [ -n "${DD_AGENT_BINARY_URL}" ]; then
            echo "::notice::Using override binary: ${DD_AGENT_BINARY_URL}"
            HTTP_CODE=$(curl -fSL -o /tmp/dd-bin/dd-agent -w '%{http_code}' \
              -D /tmp/dd-bin/headers "${DD_AGENT_BINARY_URL}")
            echo "  HTTP ${HTTP_CODE}"

            LAST_MOD=$(grep -i '^last-modified:' /tmp/dd-bin/headers | sed 's/^[^:]*: //' | tr -d '\r')
            if [ -z "${LAST_MOD}" ]; then
              echo "::error::DD_AGENT_BINARY_URL did not return a Last-Modified header"
              exit 1
            fi

            MOD_EPOCH=$(date -d "${LAST_MOD}" +%s 2>/dev/null || date -j -f "%a, %d %b %Y %H:%M:%S %Z" "${LAST_MOD}" +%s 2>/dev/null)
            NOW_EPOCH=$(date +%s)
            AGE_HOURS=$(( (NOW_EPOCH - MOD_EPOCH) / 3600 ))
            echo "  Last-Modified: ${LAST_MOD} (${AGE_HOURS}h ago)"

            if [ "${AGE_HOURS}" -ge 24 ]; then
              echo "::error::Override binary is ${AGE_HOURS}h old (max 24h). Refusing stale artifact."
              exit 1
            fi
          else
            echo "::notice::Using latest release from devopsdefender/dd"
            gh release download --repo devopsdefender/dd \
              --pattern 'dd-agent' --dir /tmp/dd-bin
          fi

          chmod +x /tmp/dd-bin/dd-agent
          echo "  Binary ready: $(ls -lh /tmp/dd-bin/dd-agent)"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BAREMETAL_SSH_KEY }}" > /tmp/deploy-key
          chmod 600 /tmp/deploy-key
          ssh-keyscan -H 57.130.10.246 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy agent VM
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
        run: |
          sha12="$(echo "${{ github.sha }}" | cut -c1-12)"
          ansible-playbook infra/ansible/playbooks/deploy.yml \
            -i infra/ansible/inventory/staging.yml \
            -e "agent_binary_local=/tmp/dd-bin/dd-agent" \
            -e "packer_template_dir=${GITHUB_WORKSPACE}/infra/packer" \
            -e "image_name=dd-baremetal-${sha12}" \
            -e "cp_url=https://app-staging.${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}"

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/deploy-key

  deploy-marketplace:
    needs: [build-image, deploy-vm]
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Wait for fresh agent to register
        run: |
          set -euo pipefail
          CP_URL="https://app-staging.${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}"

          # The deploy-vm job just replaced the old agent VM.  Wait for an
          # agent that heartbeated within the last 60s (i.e. the new one,
          # not the stale one that's about to expire).
          FOUND=false
          for i in $(seq 1 30); do
            NOW=$(date -u +%s)
            AGENT=$(curl -sf "${CP_URL}/api/v1/agents" \
              | jq --argjson now "$NOW" '
                  [.[] | select(
                    .registration_state == "ready"
                    and .node_size == "standard"
                    and .last_heartbeat_at != null
                    and ((($now - (.last_heartbeat_at | sub("\\.[0-9]+.*";"Z") | fromdateiso8601))) < 60)
                  )] | first // empty' 2>/dev/null || true)

            if [ -n "$AGENT" ]; then
              echo "Fresh agent ready: $(echo "$AGENT" | jq -r '.id[0:8]')"
              FOUND=true
              break
            fi
            echo "  waiting for fresh agent (${i}/30)..." && sleep 10
          done

          if [ "$FOUND" = "false" ]; then
            echo "::group::Current agents (debug)"
            curl -sf "${CP_URL}/api/v1/agents" | jq '.[] | {id: .id[0:8], status, node_size, registration_state, last_heartbeat_at}' || true
            echo "::endgroup::"
            echo "::error::No fresh standard agent registered within 5 minutes"
            exit 1
          fi

      - name: Deploy OpenClaw marketplace
        id: deploy
        run: |
          set -euo pipefail
          CP_URL="https://app-staging.${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}"

          IMAGE="${{ needs.build-image.outputs.image }}"
          echo "Deploying image: ${IMAGE}"

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${CP_URL}/api/v1/deploy" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn \
              --arg image "$IMAGE" \
              --arg name "marketplace" \
              --arg version "${{ github.sha }}" \
              '{image: $image, app_name: $name, app_version: $version, ports: ["8080:18789"], node_size: "standard"}')")

          HTTP_CODE=$(echo "${RESPONSE}" | tail -1)
          BODY=$(echo "${RESPONSE}" | sed '$d')
          echo "HTTP ${HTTP_CODE}: ${BODY}"
          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "::error::Deploy failed: ${BODY}"
            exit 1
          fi

          DEP_ID=$(echo "${BODY}" | jq -r .deployment_id)
          echo "deployment_id=${DEP_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for deployment to be running
        run: |
          set -euo pipefail
          CP_URL="https://app-staging.${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}"
          DEP_ID="${{ steps.deploy.outputs.deployment_id }}"
          for i in $(seq 1 24); do
            RESP=$(curl -fsSL "${CP_URL}/api/v1/deployments/${DEP_ID}")
            STATUS=$(echo "$RESP" | jq -r .status)
            echo "  attempt ${i}/24: status=${STATUS}"
            [ "$STATUS" = "running" ] && echo "Marketplace is live!" && exit 0
            if [ "$STATUS" = "failed" ]; then
              echo "$RESP" | jq -r '.error_message // "no error message"'
              echo "::error::Marketplace deployment failed"
              exit 1
            fi
            sleep 5
          done
          echo "::error::Marketplace deployment timed out (120s)"
          exit 1
