name: Deploy Marketplace

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      dd_agent_binary_url:
        description: "Override URL for dd-agent binary (must be < 24h old)"
        default: ""

concurrency:
  group: marketplace-staging
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

jobs:
  deploy-vm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install ansible

      - name: Fetch dd-agent binary
        env:
          GH_TOKEN: ${{ github.token }}
          DD_AGENT_BINARY_URL: ${{ inputs.dd_agent_binary_url }}
        run: |
          set -euo pipefail
          mkdir -p /tmp/dd-bin

          if [ -n "${DD_AGENT_BINARY_URL}" ]; then
            echo "::notice::Using override binary: ${DD_AGENT_BINARY_URL}"
            HTTP_CODE=$(curl -fSL -o /tmp/dd-bin/dd-agent -w '%{http_code}' \
              -D /tmp/dd-bin/headers "${DD_AGENT_BINARY_URL}")
            echo "  HTTP ${HTTP_CODE}"

            LAST_MOD=$(grep -i '^last-modified:' /tmp/dd-bin/headers | sed 's/^[^:]*: //' | tr -d '\r')
            if [ -z "${LAST_MOD}" ]; then
              echo "::error::DD_AGENT_BINARY_URL did not return a Last-Modified header"
              exit 1
            fi

            MOD_EPOCH=$(date -d "${LAST_MOD}" +%s 2>/dev/null || date -j -f "%a, %d %b %Y %H:%M:%S %Z" "${LAST_MOD}" +%s 2>/dev/null)
            NOW_EPOCH=$(date +%s)
            AGE_HOURS=$(( (NOW_EPOCH - MOD_EPOCH) / 3600 ))
            echo "  Last-Modified: ${LAST_MOD} (${AGE_HOURS}h ago)"

            if [ "${AGE_HOURS}" -ge 24 ]; then
              echo "::error::Override binary is ${AGE_HOURS}h old (max 24h). Refusing stale artifact."
              exit 1
            fi
          else
            echo "::notice::Using latest release from devopsdefender/dd"
            gh release download --repo devopsdefender/dd \
              --pattern 'dd-agent' --dir /tmp/dd-bin
          fi

          chmod +x /tmp/dd-bin/dd-agent
          echo "  Binary ready: $(ls -lh /tmp/dd-bin/dd-agent)"

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BAREMETAL_SSH_KEY }}" > /tmp/deploy-key
          chmod 600 /tmp/deploy-key
          ssh-keyscan -H 57.130.10.246 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy agent VM
        env:
          ANSIBLE_HOST_KEY_CHECKING: "false"
        run: |
          sha12="$(echo "${{ github.sha }}" | cut -c1-12)"
          ansible-playbook infra/ansible/playbooks/deploy.yml \
            -i infra/ansible/inventory/staging.yml \
            -e "agent_binary_local=/tmp/dd-bin/dd-agent" \
            -e "packer_template_dir=${GITHUB_WORKSPACE}/infra/packer" \
            -e "image_name=dd-baremetal-${sha12}" \
            -e "cp_url=https://app-staging.${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}"

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/deploy-key

  deploy-marketplace:
    needs: deploy-vm
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Wait for agent to register
        run: |
          CP_URL="https://app-staging.${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}"
          AGENT_READY=false
          for i in $(seq 1 30); do
            COUNT=$(curl -sf "${CP_URL}/api/v1/agents" | jq '[.[] | select(.registration_state == "ready")] | length' 2>/dev/null || echo 0)
            if [ "$COUNT" -gt 0 ]; then
              echo "Agent ready"
              AGENT_READY=true
              break
            fi
            echo "  waiting for agent (${i}/30)..." && sleep 10
          done
          if [ "$AGENT_READY" != "true" ]; then
            echo "::error::Agent did not register within 5 minutes"
            exit 1
          fi

      - name: Build instance registry
        id: registry
        run: |
          # Serialize every config/instances/*/ into a JSON array
          INSTANCE_REGISTRY=$(
            for dir in config/instances/*/; do
              [ -f "${dir}/instance.json" ] || continue

              INSTANCE=$(cat "${dir}/instance.json")

              ENV_VARS="[]"
              if [ -f "${dir}/defaults.env" ]; then
                ENV_VARS=$(grep -v '^#' "${dir}/defaults.env" | grep -v '^$' | jq -R . | jq -s .)
              fi

              SKILLS="[]"
              if [ -d "${dir}/skills" ]; then
                SKILLS=$(find "${dir}/skills" -name '*.md' -type f | sort | while read -r f; do
                  name="$(basename "$f" .md)"
                  content="$(cat "$f")"
                  jq -cn --arg name "$name" --arg content "$content" '{name: $name, content: $content}'
                done | jq -s .)
              fi

              echo "$INSTANCE" | jq -c --argjson env "$ENV_VARS" --argjson skills "$SKILLS" \
                '. + {env: $env, skills: $skills}'
            done | jq -s .
          )
          echo "Instance registry: $(echo "$INSTANCE_REGISTRY" | jq '[.[].app_name]')"

          # Save for the next step (use a temp file to avoid shell escaping issues)
          echo "$INSTANCE_REGISTRY" > /tmp/instance-registry.json

      - name: Deploy orchestrator
        run: |
          CP_URL="https://app-staging.${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}"

          # Orchestrator env — inject DD_CONTROL_PLANE_URL so it can deploy sub-instances
          ORCH_ENV=$(grep -v '^#' config/orchestrator/defaults.env | grep -v '^$' | jq -R . | jq -s .)
          ORCH_ENV=$(echo "$ORCH_ENV" | jq --arg cp "$CP_URL" '. + ["DD_CONTROL_PLANE_URL=" + $cp]')

          # Orchestrator skills from config/orchestrator/skills/
          ORCH_SKILLS=$(find config/orchestrator/skills -name '*.md' -type f | sort | while read -r f; do
            name="$(basename "$f" .md)"
            content="$(cat "$f")"
            jq -cn --arg name "$name" --arg content "$content" '{name: $name, content: $content}'
          done | jq -s .)

          # Append the instance-registry as a synthetic skill
          REGISTRY_CONTENT=$(cat /tmp/instance-registry.json)
          ORCH_SKILLS=$(echo "$ORCH_SKILLS" | jq --arg content "$REGISTRY_CONTENT" \
            '. + [{name: "instance-registry", content: $content}]')

          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${CP_URL}/api/v1/deploy" \
            -H "Content-Type: application/json" \
            -d "$(jq -cn \
              --arg image "ghcr.io/openclaw/openclaw:latest" \
              --arg name "marketplace-orchestrator" \
              --arg version "${{ github.sha }}" \
              --argjson env "$ORCH_ENV" \
              --argjson skills "$ORCH_SKILLS" \
              '{image: $image, app_name: $name, app_version: $version, env: $env, skills: $skills, ports: ["8080:3000"]}')")

          HTTP_CODE=$(echo "${RESPONSE}" | tail -1)
          BODY=$(echo "${RESPONSE}" | sed '$d')
          echo "HTTP ${HTTP_CODE}: ${BODY}"
          if [ "${HTTP_CODE}" -lt 200 ] || [ "${HTTP_CODE}" -ge 300 ]; then
            echo "::error::Orchestrator deploy failed: ${BODY}"
            exit 1
          fi
          echo "Orchestrator deployed. It will now deploy sub-instances: $(cat /tmp/instance-registry.json | jq -r '[.[].app_name] | join(", ")')"
