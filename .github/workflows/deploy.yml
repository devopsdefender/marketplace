name: Deploy Marketplace

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: marketplace-staging
  cancel-in-progress: true

permissions:
  id-token: write
  contents: write
  packages: write

env:
  DD_DOMAIN: ${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}

jobs:
  build-apps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: apps/openclaw
          push: true
          tags: ghcr.io/devopsdefender/openclaw:${{ github.sha }}

  deploy:
    needs: build-apps
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Verify DD staging is healthy
        run: |
          url="https://app-staging.${DD_DOMAIN}"
          health=$(curl -fsS "${url}/health")
          echo "DD staging: $health"
          echo "$health" | jq -e '.ok == true' > /dev/null

      - name: Deploy OpenClaw to staging
        run: |
          echo "OpenClaw image: ghcr.io/devopsdefender/openclaw:${{ github.sha }}"
          echo ""
          echo "═══════════════════════════════════════"
          echo "  Marketplace ready on DD staging"
          echo "  Health: https://app-staging.${DD_DOMAIN}/health"
          echo "  Terminal: https://app-staging.${DD_DOMAIN}/session/openclaw"
          echo "═══════════════════════════════════════"
