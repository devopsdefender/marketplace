name: Deploy Marketplace

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        type: choice
        options:
          - staging
          - production
        default: staging

concurrency:
  group: marketplace-${{ inputs.environment || 'staging' }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  DD_ENV: ${{ inputs.environment || 'staging' }}
  DD_DOMAIN: ${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}

jobs:
  build-apps:
    runs-on: ubuntu-latest
    outputs:
      openclaw_image: ghcr.io/devopsdefender/openclaw:${{ github.sha }}
      signal_cli_image: ghcr.io/devopsdefender/signal-cli:latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build OpenClaw (tagged per commit)
      - uses: docker/build-push-action@v6
        with:
          context: apps/openclaw
          push: true
          tags: |
            ghcr.io/devopsdefender/openclaw:${{ github.sha }}
            ghcr.io/devopsdefender/openclaw:latest

      # Build signal-cli
      - uses: docker/build-push-action@v6
        with:
          context: apps/signal-cli
          push: true
          tags: ghcr.io/devopsdefender/signal-cli:latest

  deploy:
    needs: build-apps
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'staging' }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve environment
        id: env
        run: |
          if [ "$DD_ENV" = "production" ]; then
            echo "ssh_host=162.222.34.121" >> "$GITHUB_OUTPUT"
            echo "ssh_user=tdx2" >> "$GITHUB_OUTPUT"
            echo "register_host=app.${DD_DOMAIN}" >> "$GITHUB_OUTPUT"
          else
            echo "ssh_host=57.130.10.246" >> "$GITHUB_OUTPUT"
            echo "ssh_user=ubuntu" >> "$GITHUB_OUTPUT"
            echo "register_host=app-staging.${DD_DOMAIN}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BAREMETAL_SSH_KEY }}" > /tmp/deploy-key
          chmod 600 /tmp/deploy-key
          ssh-keyscan -H ${{ steps.env.outputs.ssh_host }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Copy skills to host
        env:
          SSH_HOST: ${{ steps.env.outputs.ssh_host }}
          SSH_USER: ${{ steps.env.outputs.ssh_user }}
        run: |
          set -euo pipefail
          SSH="ssh -i /tmp/deploy-key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST}"
          SCP="scp -i /tmp/deploy-key -o StrictHostKeyChecking=no"

          # Create shared skills directory
          $SSH "sudo mkdir -p /var/lib/dd/shared/skills && sudo chmod -R 777 /var/lib/dd/shared"

          # Copy skills files
          $SCP config/skills/*.md "${SSH_USER}@${SSH_HOST}:/var/lib/dd/shared/skills/"

          # Copy VM provisioning script
          $SSH "sudo mkdir -p /usr/local/bin"
          $SCP scripts/dd-vm.sh "${SSH_USER}@${SSH_HOST}:/tmp/dd-vm.sh"
          $SSH "sudo mv /tmp/dd-vm.sh /usr/local/bin/dd-vm.sh && sudo chmod +x /usr/local/bin/dd-vm.sh"

          echo "Skills and scripts deployed"

      - name: Deploy dd-agent with marketplace workloads
        env:
          SSH_HOST: ${{ steps.env.outputs.ssh_host }}
          SSH_USER: ${{ steps.env.outputs.ssh_user }}
          REGISTER_HOST: ${{ steps.env.outputs.register_host }}
          OPENCLAW_IMAGE: ${{ needs.build-apps.outputs.openclaw_image }}
          SIGNAL_CLI_IMAGE: ${{ needs.build-apps.outputs.signal_cli_image }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          set -euo pipefail
          SSH="ssh -i /tmp/deploy-key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST}"

          echo "Deploying to ${SSH_HOST} (${DD_ENV})..."

          # Stop existing dd-agent if running
          $SSH "sudo pkill dd-agent 2>/dev/null || true; sleep 2"

          # Download dd-agent binary from DD releases (newest release, including pre-releases)
          $SSH "sudo curl -fsSL -o /usr/local/bin/dd-agent \
            \$(curl -sf https://api.github.com/repos/devopsdefender/dd/releases | \
              jq -r '.[0].assets[] | select(.name==\"dd-agent\") | .browser_download_url') \
            && sudo chmod +x /usr/local/bin/dd-agent"

          # Download cloudflared
          $SSH "command -v cloudflared >/dev/null || sudo curl -fsSL -o /usr/local/bin/cloudflared \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            && sudo chmod +x /usr/local/bin/cloudflared"

          # Start dd-agent with:
          # - OpenClaw as primary boot workload (with OpenRouter key + register access)
          # - signal-cli as second workload
          $SSH "sudo bash -c 'DD_OWNER=devopsdefender \
            DD_ENV=${DD_ENV} \
            DD_REGISTER_URL=wss://${REGISTER_HOST}/register \
            DD_BOOT_IMAGE=${OPENCLAW_IMAGE} \
            DD_BOOT_APP=openclaw \
            DD_BOOT_TTY=true \
            DD_BOOT_ENV=\"OPENROUTER_API_KEY=${OPENROUTER_API_KEY};DD_REGISTER_URL=wss://${REGISTER_HOST}/register;DD_SKILLS_DIR=/var/lib/dd/shared/skills\" \
            DD_BOOT_IMAGE_2=${SIGNAL_CLI_IMAGE} \
            DD_BOOT_APP_2=signal-cli \
            nohup /usr/local/bin/dd-agent > /var/log/dd-agent.log 2>&1 &'"

          echo "dd-agent started, registering with ${REGISTER_HOST}..."
          sleep 10

          # Verify agent is running — fail fast if it crashed
          for i in $(seq 1 6); do
            if $SSH "curl -fsS http://localhost:8080/health" 2>/dev/null; then
              echo "Agent healthy!"
              break
            fi
            # Check if process died
            if ! $SSH "pgrep -x dd-agent" >/dev/null 2>&1; then
              echo "::error::dd-agent process died. Last 20 lines of log:"
              $SSH "tail -20 /var/log/dd-agent.log 2>/dev/null" || true
              exit 1
            fi
            echo "  waiting for agent... attempt ${i}/6"
            sleep 5
          done
          # Final check
          $SSH "curl -fsS http://localhost:8080/health" || {
            echo "::error::Agent not healthy after 40s. Log tail:"
            $SSH "tail -20 /var/log/dd-agent.log 2>/dev/null" || true
            exit 1
          }

      - name: Verify marketplace is live
        env:
          REGISTER_HOST: ${{ steps.env.outputs.register_host }}
          SSH_HOST: ${{ steps.env.outputs.ssh_host }}
          SSH_USER: ${{ steps.env.outputs.ssh_user }}
        run: |
          set -euo pipefail
          SSH="ssh -i /tmp/deploy-key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST}"

          # Check agent registered with DD fleet
          for i in $(seq 1 12); do
            health=$(curl -fsS "https://${REGISTER_HOST}/health" 2>/dev/null) || true
            if [ -n "$health" ]; then
              echo "DD register healthy: $health"
              break
            fi
            echo "  waiting for register... attempt ${i}/12"
            sleep 5
          done

          # Check workload count
          deps=$($SSH "curl -fsS http://localhost:8080/deployments" 2>/dev/null) || deps="[]"
          dep_count=$(echo "$deps" | jq 'length')
          echo "Deployments: $dep_count"
          echo "$deps" | jq -r '.[] | "  [\(.app_name)] \(.status) (pid: \(.pid // "n/a"))"'

          echo ""
          echo "═══════════════════════════════════════"
          echo "  Marketplace deployed (${DD_ENV})"
          echo "  Fleet: https://${REGISTER_HOST}/"
          echo "  Workloads: ${dep_count}"
          echo "  Skills: /var/lib/dd/shared/skills/"
          echo "═══════════════════════════════════════"

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/deploy-key
