name: Deploy Marketplace

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        type: choice
        options:
          - staging
          - production
        default: staging

concurrency:
  group: marketplace-${{ inputs.environment || 'staging' }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  DD_ENV: ${{ inputs.environment || 'staging' }}
  DD_DOMAIN: ${{ vars.DD_CF_DOMAIN || 'devopsdefender.com' }}

jobs:
  build-apps:
    runs-on: ubuntu-latest
    outputs:
      openclaw_image: ghcr.io/devopsdefender/openclaw:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: apps/openclaw
          push: true
          tags: |
            ghcr.io/devopsdefender/openclaw:${{ github.sha }}
            ghcr.io/devopsdefender/openclaw:latest

  deploy:
    needs: build-apps
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'staging' }}
    steps:
      - name: Resolve environment
        id: env
        run: |
          if [ "$DD_ENV" = "production" ]; then
            echo "ssh_host=162.222.34.121" >> "$GITHUB_OUTPUT"
            echo "ssh_user=tdx2" >> "$GITHUB_OUTPUT"
            echo "register_host=app.${DD_DOMAIN}" >> "$GITHUB_OUTPUT"
          else
            echo "ssh_host=57.130.10.246" >> "$GITHUB_OUTPUT"
            echo "ssh_user=ubuntu" >> "$GITHUB_OUTPUT"
            echo "register_host=app-staging.${DD_DOMAIN}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BAREMETAL_SSH_KEY }}" > /tmp/deploy-key
          chmod 600 /tmp/deploy-key
          ssh-keyscan -H ${{ steps.env.outputs.ssh_host }} >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy dd-agent to baremetal host
        env:
          SSH_HOST: ${{ steps.env.outputs.ssh_host }}
          SSH_USER: ${{ steps.env.outputs.ssh_user }}
          REGISTER_HOST: ${{ steps.env.outputs.register_host }}
          OPENCLAW_IMAGE: ${{ needs.build-apps.outputs.openclaw_image }}
        run: |
          set -euo pipefail
          SSH="ssh -i /tmp/deploy-key -o StrictHostKeyChecking=no ${SSH_USER}@${SSH_HOST}"

          echo "Deploying to ${SSH_HOST} (${DD_ENV})..."

          # Stop existing dd-agent if running
          $SSH "sudo pkill dd-agent 2>/dev/null || true; sleep 2"

          # Download dd-agent binary from DD releases
          $SSH "sudo curl -fsSL -o /usr/local/bin/dd-agent \
            https://github.com/devopsdefender/dd/releases/latest/download/dd-agent \
            && sudo chmod +x /usr/local/bin/dd-agent" || {
            echo "::warning::Could not download from latest release, trying staging release"
            $SSH "sudo curl -fsSL -o /usr/local/bin/dd-agent \
              \$(curl -sf https://api.github.com/repos/devopsdefender/dd/releases | \
                jq -r '.[0].assets[] | select(.name==\"dd-agent\") | .browser_download_url') \
              && sudo chmod +x /usr/local/bin/dd-agent"
          }

          # Download cloudflared
          $SSH "command -v cloudflared >/dev/null || sudo curl -fsSL -o /usr/local/bin/cloudflared \
            https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 \
            && sudo chmod +x /usr/local/bin/cloudflared"

          # Start dd-agent with registration pointing to DD register service
          $SSH "sudo DD_OWNER=devopsdefender \
            DD_ENV=${DD_ENV} \
            DD_REGISTER_URL=wss://${REGISTER_HOST}/register \
            DD_BOOT_IMAGE=${OPENCLAW_IMAGE} \
            DD_BOOT_APP=openclaw \
            nohup /usr/local/bin/dd-agent > /var/log/dd-agent.log 2>&1 &"

          echo "dd-agent started, registering with ${REGISTER_HOST}..."
          sleep 10

          # Verify agent is running
          $SSH "curl -fsS http://localhost:8080/health" || echo "::warning::Agent health check failed"

      - name: Verify agent registered with DD
        run: |
          REGISTER_HOST="${{ steps.env.outputs.register_host }}"
          for i in $(seq 1 12); do
            health=$(curl -fsS "https://${REGISTER_HOST}/health" 2>/dev/null) || true
            if [ -n "$health" ]; then
              echo "DD register healthy: $health"
              break
            fi
            echo "  waiting for register... attempt ${i}/12"
            sleep 5
          done

          echo ""
          echo "═══════════════════════════════════════"
          echo "  Marketplace deployed (${DD_ENV})"
          echo "  Fleet: https://${REGISTER_HOST}/"
          echo "  Agent should appear in fleet dashboard"
          echo "═══════════════════════════════════════"

      - name: Cleanup SSH key
        if: always()
        run: rm -f /tmp/deploy-key
